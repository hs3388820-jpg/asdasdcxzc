name: Android Cloud Phone

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── Step 1: Free disk space ──
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      # ── Step 2: Start Android Emulator ──
      - name: Start Android Emulator
        run: |
          docker run -d --privileged \
            -p 6080:6080 \
            -p 5554:5554 \
            -p 5555:5555 \
            -e EMULATOR_DEVICE="Samsung Galaxy S10" \
            -e WEB_VNC=true \
            -e GPU_MODE=swiftshader_indirect \
            -e DATAPARTITION="8g" \
            --name android-container \
            budtmo/docker-android:emulator_14.0

      # ── Step 3: Wait for full boot ──
      - name: Wait for emulator to boot
        run: |
          echo "⏳ Waiting for emulator to fully boot..."
          timeout 300 bash -c '
            while true; do
              STATUS=$(docker exec android-container adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")
              if [ "$STATUS" = "1" ]; then
                echo "✅ Emulator booted!"
                break
              fi
              echo "Still booting..."
              sleep 10
            done
          '
          sleep 20
          docker exec android-container adb devices

      # ── Step 4: Enable Root ──
      - name: Enable Root Access
        run: |
          echo "🔓 Enabling root..."
          docker exec android-container adb root
          sleep 5
          docker exec android-container adb shell "id"
          echo "✅ Root confirmed!"

      # ── Step 5: Remount system and reboot ──
      - name: Remount system partition
        run: |
          echo "🔧 Remounting system as writable..."
          docker exec android-container adb root
          sleep 3
          docker exec android-container adb shell "avbctl disable-verification" 2>/dev/null || true
          docker exec android-container adb disable-verity 2>/dev/null || true
          docker exec android-container adb reboot
          
          echo "⏳ Waiting for reboot..."
          sleep 30
          
          timeout 300 bash -c '
            while true; do
              STATUS=$(docker exec android-container adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")
              if [ "$STATUS" = "1" ]; then
                echo "✅ Rebooted!"
                break
              fi
              echo "Still rebooting..."
              sleep 10
            done
          '
          sleep 10
          
          docker exec android-container adb root
          sleep 3
          docker exec android-container adb remount
          sleep 5
          echo "✅ System is now writable!"
          
          # Verify writable
          docker exec android-container adb shell "touch /system/test_write && rm /system/test_write && echo 'System is writable!'" || echo "Using alternative install method"

      # ── Step 6: Install Google Play Store + Services ──
      - name: Install Google Play Store
        run: |
          docker exec android-container bash -c '
            cd /tmp
            
            echo "📥 Downloading Google Play Store and Services..."
            
            # Download Play Store (Phonesky)
            wget -q --no-check-certificate \
              "https://raw.githubusercontent.com/nicholasgasior/gapps/main/Phonesky.apk" \
              -O Phonesky.apk 2>/dev/null || true
            
            # Try system install first, fall back to regular install
            adb root
            sleep 2
            
            echo "📦 Attempting system-level install..."
            
            # Method 1: Push to system (if writable)
            adb shell "mkdir -p /system/priv-app/Phonesky" 2>/dev/null
            if adb push Phonesky.apk /system/priv-app/Phonesky/Phonesky.apk 2>/dev/null; then
              adb shell "chmod 644 /system/priv-app/Phonesky/Phonesky.apk"
              echo "✅ Play Store installed to system!"
            else
              echo "⚠️ System install failed, using user install..."
              adb install Phonesky.apk 2>/dev/null || true
            fi
          '

      # ── Step 7: Install Aurora Store (Guaranteed Google Play Access) ──
      - name: Install Aurora Store + F-Droid
        run: |
          docker exec android-container bash -c '
            cd /tmp
            adb root
            sleep 2
            
            echo "📥 Downloading Aurora Store..."
            
            # Try multiple sources
            wget -q --no-check-certificate \
              "https://auroraoss.com/downloads/AuroraStore/Release/AuroraStore_4.6.1.apk" \
              -O aurora.apk 2>/dev/null
            
            if [ ! -s aurora.apk ]; then
              wget -q --no-check-certificate \
                "https://f-droid.org/repo/com.aurora.store_58.apk" \
                -O aurora.apk 2>/dev/null
            fi
            
            if [ -s aurora.apk ]; then
              adb install aurora.apk && echo "✅ Aurora Store installed!" || echo "❌ Aurora install failed"
            else
              echo "⚠️ Could not download Aurora Store"
            fi
            
            echo ""
            echo "📥 Downloading F-Droid..."
            wget -q --no-check-certificate \
              "https://f-droid.org/F-Droid.apk" \
              -O fdroid.apk 2>/dev/null
            
            if [ -s fdroid.apk ]; then
              adb install fdroid.apk && echo "✅ F-Droid installed!" || echo "❌ F-Droid install failed"
            fi
            
            # Allow unknown sources
            adb shell "settings put secure install_non_market_apps 1"
            adb shell "settings put global package_verifier_enable 0"
            
            echo ""
            echo "📱 All installed apps:"
            adb shell "pm list packages -3" | sed "s/package://g"
          '

      # ── Step 8: Create Cloudflare Tunnel ──
      - name: Create public URL
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

          ./cloudflared tunnel --url http://localhost:6080 --no-autoupdate > /tmp/tunnel.log 2>&1 &

          echo "⏳ Creating tunnel..."
          
          # Wait and extract URL
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 2
          done

          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║              🤖 ANDROID IS READY!                       ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║                                                          ║"
          echo "║  📱 Open in your browser:                                ║"
          echo "║                                                          ║"
          if [ -n "$TUNNEL_URL" ]; then
          echo "║  🔗 $TUNNEL_URL"
          else
          echo "║  ⚠️  URL not ready - check logs below                   ║"
          cat /tmp/tunnel.log
          fi
          echo "║                                                          ║"
          echo "║  🔓 Root: ENABLED                                        ║"
          echo "║  🏪 Aurora Store = Google Play apps                      ║"
          echo "║  ⏰ Session: Up to 6 hours                               ║"
          echo "║                                                          ║"
          echo "║  👉 Click 'Connect' on the noVNC page                   ║"
          echo "║                                                          ║"
          echo "╚══════════════════════════════════════════════════════════╝"

      # ── Step 9: Keep alive ──
      - name: Keep alive
        run: |
          echo "✅ Android is running!"
          COUNTER=0
          while true; do
            sleep 300
            COUNTER=$((COUNTER + 1))
            echo "⏱️ Running for $((COUNTER * 5)) minutes..."
          done
